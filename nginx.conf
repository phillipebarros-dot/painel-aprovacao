server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ============================================================
    # SECURITY HEADERS (aplicados a TODAS as respostas)
    # ============================================================
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com https://apis.google.com 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleusercontent.com; connect-src 'self' https://n8n.grupoom.com.br https://accounts.google.com https://oauth2.googleapis.com; frame-src https://accounts.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ============================================================
    # DESABILITAR METODOS HTTP PERIGOSOS
    # ============================================================
    if ($request_method !~ ^(GET|HEAD|POST|OPTIONS)$) {
        return 405;
    }

    # Bloquear TRACE explicitamente
    if ($request_method = TRACE) {
        return 405;
    }

    # ============================================================
    # RATE LIMITING (definido no bloco http do nginx.conf principal)
    # Para funcionar, adicionar no bloco http:
    #   limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    #   limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;
    # ============================================================

    # index.html NUNCA cachear (aponta para chunks versionados)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        # Herdar security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # SPA/MPA fallback: qualquer rota cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo dos assets versionados (hash no nome garante cache busting)
    location ~* \.(js|jsx|css|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Herdar security headers para assets
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # ============================================================
    # BLOQUEAR ACESSO A ARQUIVOS SENSIVEIS
    # ============================================================
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.(env|git|bak|sql|log|yml|yaml|toml|ini|conf|config)$ {
        deny all;
        return 404;
    }

    location ~* (backup|dump|config|\.git) {
        deny all;
        return 404;
    }

    # Bloquear acesso a package.json, Dockerfile, etc.
    location ~* (package\.json|package-lock\.json|Dockerfile|docker-compose|\.dockerignore) {
        deny all;
        return 404;
    }

    # ============================================================
    # CUSTOM ERROR PAGES (sem info leak)
    # ============================================================
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
